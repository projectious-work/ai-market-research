<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI market research · Signal room</title><style>__CONTENT_CSS__
body{background:var(--brand-paper)}.mast{background:var(--brand-midnight);color:#fff}
.mast-top{min-height:62px;padding:0 28px;display:flex;align-items:center;gap:18px;border-bottom:1px solid #40536d}
.logo{margin-right:auto;font:700 17px var(--font-display)}.logo small{margin-left:8px;color:#b8c4d1;font-weight:400}
.mast label{display:flex;align-items:center;gap:6px;color:#c8d0da;font-size:11px}.mast select{border-color:#66778c;background:#fff}
.ticker{display:grid;grid-template-columns:180px minmax(0,1fr);min-height:54px;padding:0 28px;align-items:center}
.ticker strong{font:700 13px var(--font-display)}.ticker p{margin:0;color:#d9dfe6;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav{position:sticky;top:0;z-index:10;display:flex;overflow-x:auto;padding:0 28px;background:#fff;border-bottom:1px solid var(--brand-strong)}
.nav a{padding:13px 16px;border-bottom:2px solid transparent;color:var(--brand-slate);font-size:12px;font-weight:650;text-decoration:none;white-space:nowrap}
.nav a:hover{border-color:var(--brand-orange);color:var(--brand-midnight)}
.canvas{max-width:1480px;margin:auto}.module{padding:38px 30px 52px;border-bottom:1px solid var(--brand-strong)}
.module:nth-child(even){background:#fff}.module-inner{max-width:1360px;margin:auto}
#now .module-inner{display:grid;grid-template-columns:minmax(0,1.6fr) minmax(320px,.8fr);gap:28px}
#now [data-report-module=briefing] .r-summaries{grid-template-columns:1fr 1fr}
#now [data-report-module=signals] .r-actions{grid-template-columns:1fr}.signal-side{min-width:0}
#now .r-changes article:nth-child(n+8){display:none}
@media(max-width:980px){#now .module-inner{grid-template-columns:1fr}.mast-top{flex-wrap:wrap;padding-block:12px}.logo{width:100%}}
@media(max-width:640px){.ticker{grid-template-columns:1fr;padding-block:10px}.module{padding:28px 16px}.mast-top,.nav{padding-inline:16px}.mast label{width:100%;justify-content:space-between}.mast select{flex:1}}
</style></head><body><header class="mast"><div class="mast-top"><div class="logo">projectious.work <small>signal room</small></div>
<label>Reference <select data-control="reference"></select></label><label>Region <select data-control="jurisdiction"><option value="all">All</option><option>US</option><option>EU</option><option>China</option><option value="not-China">Exclude China</option></select></label><label>Workload <select data-control="workload"><option value="cold">Cold</option><option value="mixed">Mixed</option><option value="warm">Warm</option><option value="hot">Hot</option></select></label></div>
<div class="ticker"><strong>Current reference</strong><p><span data-current-reference></span> · market state, actions, and evidence in one continuous operating room</p></div></header>
<nav class="nav"><a href="#now">Now</a><a href="#market">Market</a><a href="#economics">Economics</a><a href="#tools">Tools</a><a href="#infrastructure">Infrastructure</a><a href="#decisions">Decisions</a><a href="#evidence">Evidence</a></nav>
<main class="canvas"><section class="module" id="now"><div class="module-inner"><div data-report-module="briefing"></div><aside class="signal-side" data-report-module="signals"></aside></div></section>
<section class="module" id="market"><div class="module-inner" data-report-module="models"></div></section><section class="module" id="economics"><div class="module-inner" data-report-module="economics"></div></section>
<section class="module" id="tools"><div class="module-inner" data-report-module="tooling"></div></section><section class="module" id="infrastructure"><div class="module-inner" data-report-module="infrastructure"></div></section>
<section class="module" id="decisions"><div class="module-inner" data-report-module="decisions"></div></section><section class="module" id="evidence"><div class="module-inner" data-report-module="evidence"></div></section></main>
<script id="market-data" type="application/json">__MARKET_DATA__</script><script id="model-roster" type="application/json">__MODEL_ROSTER__</script><script>__REPORT_JS__</script></body></html>
