<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI market research · Comparison studio</title><style>__CONTENT_CSS__
body{background:#fff}.studio{min-height:100vh;display:grid;grid-template-columns:220px minmax(0,1fr)}
.tools{position:sticky;top:0;height:100vh;padding:22px 16px;background:var(--brand-warm);border-right:1px solid var(--brand-strong);overflow-y:auto}
.studio-logo{padding:0 8px 20px;color:var(--brand-midnight);font:700 17px var(--font-display)}.studio-logo small{display:block;margin-top:5px;color:var(--brand-slate);font:12px var(--font-ui)}
.tools h2{margin:18px 8px 7px;color:var(--brand-muted);font-size:10px;text-transform:uppercase}.tools label{display:block;margin:0 8px 12px;color:var(--brand-slate);font-size:11px}.tools select{width:100%;margin-top:4px}
.tools nav a{display:block;padding:8px;border-left:2px solid transparent;color:var(--brand-ink);font-size:13px;text-decoration:none}.tools nav a:hover{border-color:var(--brand-orange);background:#fff;color:var(--brand-midnight)}
.workspace{min-width:0}.workspace-head{position:sticky;top:0;z-index:10;min-height:58px;padding:0 26px;display:flex;align-items:center;background:rgba(255,255,255,.97);border-bottom:1px solid var(--brand-line)}
.workspace-head h1{margin:0 auto 0 0;color:var(--brand-midnight);font:700 16px var(--font-display)}.workspace-head span{color:var(--brand-muted);font-size:12px}
.pane{padding:34px 28px 52px;border-bottom:1px solid var(--brand-strong)}.pane:nth-child(odd){background:var(--brand-paper)}.pane-inner{max-width:1400px;margin:auto}
#compare .r-heading h2{font-size:30px}#compare .roster .r-table th:first-child,#compare .roster .r-table td:first-child{position:sticky;left:0;background:#fff;z-index:2}
#decide .r-recommendation{grid-template-columns:1fr 1fr}.brief-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
@media(max-width:840px){.studio{grid-template-columns:1fr}.tools{position:static;width:100%;height:auto}.tools nav{display:flex;overflow-x:auto}.tools nav a{white-space:nowrap}.tools h2{display:none}.filter-grid{display:grid;grid-template-columns:repeat(3,1fr)}.workspace-head{position:static}.brief-grid{grid-template-columns:1fr}.pane{padding:28px 16px}}
@media(max-width:560px){.filter-grid{grid-template-columns:1fr}.workspace-head{display:block;padding-block:12px}.workspace-head span{display:block;margin-top:4px}}
</style></head><body><div class="studio"><aside class="tools"><div class="studio-logo">projectious.work<small>comparison studio</small></div><div class="filter-grid">
<label>Reference<select data-control="reference"></select></label><label>Jurisdiction<select data-control="jurisdiction"><option value="all">All</option><option>US</option><option>EU</option><option>China</option><option value="not-China">Exclude China</option></select></label><label>Workload<select data-control="workload"><option value="cold">Cold</option><option value="mixed">Mixed</option><option value="warm">Warm</option><option value="hot">Hot</option></select></label></div>
<h2>Workspace</h2><nav><a href="#compare">Compare</a><a href="#decide">Decide</a><a href="#cost">Cost and policy</a><a href="#operate">Operate</a><a href="#deploy">Deploy</a><a href="#pulse">Pulse</a><a href="#proof">Proof</a></nav></aside>
<div class="workspace"><header class="workspace-head"><h1>Model comparison studio</h1><span>Reference: <b data-current-reference></b></span></header><main>
<section class="pane" id="compare"><div class="pane-inner" data-report-module="models"></div></section><section class="pane" id="decide"><div class="pane-inner" data-report-module="decisions"></div></section>
<section class="pane" id="cost"><div class="pane-inner" data-report-module="economics"></div></section><section class="pane" id="operate"><div class="pane-inner" data-report-module="tooling"></div></section>
<section class="pane" id="deploy"><div class="pane-inner" data-report-module="infrastructure"></div></section><section class="pane" id="pulse"><div class="pane-inner brief-grid"><div data-report-module="briefing"></div><div data-report-module="signals"></div></div></section>
<section class="pane" id="proof"><div class="pane-inner" data-report-module="evidence"></div></section></main></div></div>
<script id="market-data" type="application/json">__MARKET_DATA__</script><script id="model-roster" type="application/json">__MODEL_ROSTER__</script><script>__REPORT_JS__</script></body></html>
