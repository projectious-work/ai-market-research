<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AI market research · __DESIGN_TITLE__</title>
  <style>
    :root {
      --paper: #f5f4f2; --rail: #ebe8e2; --surface: #fff;
      --ink: #18202a; --midnight: #1d3352; --slate: #546a82;
      --muted: #6e757d; --line: #e0ded9; --strong: #c9c6bf;
      --orange: #e05232; --orange-soft: #faeee9; --green: #28705a;
      --amber: #946416; --sans: "Source Sans 3", "Segoe UI", Arial, sans-serif;
      --display: "Plus Jakarta Sans", "Segoe UI", Arial, sans-serif;
      --mono: "IBM Plex Mono", Consolas, monospace;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; background: var(--paper); }
    body { margin: 0; min-width: 320px; color: var(--ink); font-family: var(--sans); }
    button, select { font: inherit; }
    .app { min-height: 100vh; display: grid; grid-template-columns: 232px minmax(0,1fr); }
    .rail { position: sticky; top: 0; height: 100vh; padding: 20px 14px;
      overflow-y: auto; background: var(--rail); border-right: 1px solid var(--strong); }
    .brand { padding: 0 10px 18px; color: var(--midnight);
      font: 700 17px/1.2 var(--display); }
    .brand small { display: block; margin-top: 5px; color: var(--slate);
      font: 12px/1.35 var(--sans); }
    .design-tag { margin: 0 10px 18px; padding: 8px 0;
      border-block: 1px solid var(--strong); color: var(--muted); font-size: 11px; }
    nav a { display: block; padding: 7px 9px; border-left: 2px solid transparent;
      color: var(--ink); font-size: 13px; text-decoration: none; }
    nav a:hover, nav a.active { background: rgba(255,255,255,.6);
      border-left-color: var(--orange); color: var(--midnight); }
    nav .group { margin: 16px 9px 5px; color: var(--muted);
      font-size: 10px; font-weight: 700; text-transform: uppercase; }
    .page { min-width: 0; }
    .topbar { position: sticky; top: 0; z-index: 10; min-height: 56px;
      padding: 8px 24px; display: flex; align-items: center; gap: 12px;
      background: rgba(255,255,255,.97); border-bottom: 1px solid var(--line); }
    .topbar strong { margin-right: auto; color: var(--midnight);
      font: 700 15px var(--display); }
    .control { display: flex; align-items: center; gap: 6px;
      color: var(--muted); font-size: 12px; }
    select { height: 32px; max-width: 210px; padding: 0 26px 0 8px;
      border: 1px solid var(--strong); border-radius: 4px;
      background: var(--surface); color: var(--ink); }
    .layout { display: grid; grid-template-columns: minmax(0,1fr); }
    main { width: min(1400px,100%); margin: 0 auto; padding: 34px 30px 72px; }
    .context-panel { display: none; }
    .intro { margin-bottom: 30px; }
    .eyebrow { color: var(--orange); font-size: 12px; font-weight: 700; }
    h1 { margin: 6px 0 8px; color: var(--midnight);
      font: 700 30px/1.15 var(--display); letter-spacing: 0; }
    .lede { max-width: 780px; margin: 0; color: var(--slate);
      font-size: 16px; line-height: 1.5; }
    .coverage { margin-top: 14px; color: var(--muted); font-size: 12px; }
    .report-section { scroll-margin-top: 76px; margin: 0 0 42px; }
    .section-title { display: flex; align-items: baseline; gap: 10px;
      padding-bottom: 9px; border-bottom: 1px solid var(--strong); }
    .section-title span { color: var(--orange); font-family: var(--mono); font-size: 11px; }
    h2 { margin: 0; color: var(--midnight); font: 700 21px/1.25 var(--display); }
    h3 { margin: 25px 0 9px; color: var(--midnight); font: 700 16px var(--display); }
    .section-note { max-width: 920px; margin: 9px 0 14px; color: var(--slate);
      font-size: 13px; line-height: 1.5; }
    .kpis { display: grid; grid-template-columns: repeat(4,minmax(0,1fr));
      border: 1px solid var(--line); background: var(--surface); }
    .kpi { min-height: 92px; padding: 14px 16px; border-right: 1px solid var(--line); }
    .kpi:nth-child(4n) { border-right: 0; }
    .kpi:nth-child(n+5) { border-top: 1px solid var(--line); }
    .kpi span { display: block; color: var(--muted); font-size: 11px; }
    .kpi strong { display: block; margin: 7px 0 5px; color: var(--midnight);
      font: 700 22px var(--display); }
    .kpi small { color: var(--slate); font-size: 11px; }
    .summary-grid, .strategy-grid { display: grid;
      grid-template-columns: repeat(2,minmax(0,1fr)); gap: 12px; }
    .summary, .strategy-card { padding: 16px; border: 1px solid var(--line);
      background: var(--surface); }
    .summary h3, .strategy-card h3 { margin-top: 0; }
    .summary p, .strategy-card p, .strategy-card li { font-size: 13px; line-height: 1.5; }
    .table-wrap { width: 100%; overflow-x: auto; border: 1px solid var(--line);
      background: var(--surface); }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th { background: #f8f7f5; color: var(--muted); font-size: 10px;
      font-weight: 700; text-align: left; }
    th, td { padding: 9px 10px; border-bottom: 1px solid var(--line);
      vertical-align: top; white-space: nowrap; }
    tbody tr:last-child td { border-bottom: 0; }
    tbody tr:hover { background: #faf9f7; }
    td.wrap, th.wrap { min-width: 220px; white-space: normal; line-height: 1.45; }
    td.model { min-width: 170px; color: var(--midnight); font-weight: 650; }
    td.model small { display: block; margin-top: 3px; color: var(--muted); font-weight: 400; }
    .mono { font-family: var(--mono); font-variant-numeric: tabular-nums; }
    .badge { display: inline-block; padding: 2px 5px; border: 1px solid var(--strong);
      border-radius: 3px; color: var(--slate); font-size: 10px; }
    .yes { color: var(--green); } .no { color: var(--muted); }
    .items { margin: 0; padding-left: 18px; }
    .items li { margin: 6px 0; line-height: 1.45; }
    .change { display: grid; grid-template-columns: 88px 70px 1fr; gap: 9px;
      padding: 9px 0; border-bottom: 1px solid var(--line); font-size: 12px; }
    .change time, .change b { color: var(--muted); font-family: var(--mono); }
    details { border-bottom: 1px solid var(--line); background: var(--surface); }
    details:first-child { border-top: 1px solid var(--line); }
    summary { cursor: pointer; padding: 11px 12px; color: var(--midnight); font-weight: 650; }
    details > div { padding: 0 12px 13px; color: var(--slate); font-size: 12px; line-height: 1.5; }
    .source-columns { columns: 3; column-gap: 28px; }
    .source { break-inside: avoid; margin: 0 0 10px; font-size: 12px; }
    .source a { color: var(--midnight); text-decoration-color: var(--strong); }
    .disclaimer { margin-top: 30px; padding: 14px; border-left: 3px solid var(--orange);
      background: var(--orange-soft); color: #63392f; font-size: 12px; line-height: 1.5; }

    body[data-design="market-map"] .app { grid-template-columns: 1fr; }
    body[data-design="market-map"] .rail { position: sticky; z-index: 11; width: 100%;
      height: auto; padding: 12px 24px; display: flex; align-items: center; gap: 18px;
      border-right: 0; border-bottom: 1px solid var(--strong); }
    body[data-design="market-map"] .brand { padding: 0; white-space: nowrap; }
    body[data-design="market-map"] .brand small, body[data-design="market-map"] .design-tag,
    body[data-design="market-map"] nav .group { display: none; }
    body[data-design="market-map"] nav { display: flex; overflow-x: auto; }
    body[data-design="market-map"] nav a { white-space: nowrap; border-left: 0;
      border-bottom: 2px solid transparent; }
    body[data-design="market-map"] nav a.active { border-bottom-color: var(--orange); }
    body[data-design="market-map"] .topbar { top: 57px; }
    body[data-design="market-map"] .report-section { scroll-margin-top: 132px; }

    body[data-design="workbench"] .app { grid-template-columns: 188px minmax(0,1fr); }
    body[data-design="workbench"] .layout { grid-template-columns: minmax(0,1fr) 280px; }
    body[data-design="workbench"] .context-panel { display: block; position: sticky; top: 56px;
      align-self: start; height: calc(100vh - 56px); overflow-y: auto; padding: 22px 18px;
      border-left: 1px solid var(--line); background: #f8f7f5; }
    body[data-design="workbench"] .context-panel h3 { margin-top: 0; }
    body[data-design="workbench"] main { padding-inline: 24px; }

    body[data-design="living-brief"] .app { grid-template-columns: 276px minmax(0,1fr); }
    body[data-design="living-brief"] main { max-width: 980px; }
    body[data-design="living-brief"] .report-section { margin-bottom: 56px; }
    body[data-design="living-brief"] .section-title { align-items: center;
      border-bottom-width: 2px; }
    body[data-design="living-brief"] .summary-grid { grid-template-columns: 1fr; }

    @media (max-width: 1050px) {
      body[data-design="workbench"] .layout { grid-template-columns: 1fr; }
      body[data-design="workbench"] .context-panel { display: none; }
      .source-columns { columns: 2; }
    }
    @media (max-width: 820px) {
      .app, body[data-design="workbench"] .app,
      body[data-design="living-brief"] .app { grid-template-columns: 1fr; }
      .rail, body[data-design="market-map"] .rail { position: static; width: 100%;
        height: auto; padding: 12px 16px; display: block; }
      .brand { padding: 0; } .brand small, .design-tag, nav .group { display: none; }
      nav { display: flex; margin-top: 10px; overflow-x: auto; }
      nav a { white-space: nowrap; border-left: 0; border-bottom: 2px solid transparent; }
      nav a.active { border-bottom-color: var(--orange); }
      .topbar, body[data-design="market-map"] .topbar { position: static; flex-wrap: wrap;
        padding: 10px 16px; }
      .topbar strong { width: 100%; }
      main { padding: 26px 16px 50px; }
      .report-section { scroll-margin-top: 16px; }
      .kpis { grid-template-columns: repeat(2,minmax(0,1fr)); }
      .kpi:nth-child(2n) { border-right: 0; }
      .kpi:nth-child(n+3) { border-top: 1px solid var(--line); }
      .summary-grid, .strategy-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 520px) {
      .control { width: 100%; justify-content: space-between; }
      .control select { flex: 1; } h1 { font-size: 25px; }
      .source-columns { columns: 1; }
    }
  </style>
</head>
<body data-design="__DESIGN_MODE__">
  <div class="app">
    <aside class="rail">
      <div class="brand">projectious.work<small>AI market research</small></div>
      <div class="design-tag">Design __DESIGN_NUMBER__ · __DESIGN_SHORT__</div>
      <nav id="nav" aria-label="Report navigation"></nav>
    </aside>
    <div class="page">
      <header class="topbar">
        <strong>__DESIGN_TITLE__</strong>
        <label class="control">Reference <select id="reference"></select></label>
        <label class="control">Jurisdiction
          <select id="jurisdiction"><option value="all">All</option><option>US</option>
            <option>EU</option><option>China</option><option value="not-China">Exclude China</option></select>
        </label>
        <label class="control">Workload
          <select id="workload"><option value="cold">Cold</option><option value="mixed">Mixed</option>
            <option value="warm">Warm</option><option value="hot">Hot</option></select>
        </label>
      </header>
      <div class="layout">
        <main><div class="intro"><div class="eyebrow">Design exploration · complete report</div>
          <h1>__DESIGN_HEADING__</h1><p class="lede">__DESIGN_LEDE__</p>
          <p class="coverage">All original report sections are present; only navigation, grouping, and order change.</p>
        </div><div id="content"></div></main>
        <aside class="context-panel" id="context-panel"></aside>
      </div>
    </div>
  </div>
  <script id="market-data" type="application/json">__MARKET_DATA__</script>
  <script id="model-roster" type="application/json">__MODEL_ROSTER__</script>
  <script>
    const data = JSON.parse(document.getElementById('market-data').textContent);
    const roster = JSON.parse(document.getElementById('model-roster').textContent);
    const design = document.body.dataset.design;
    const $ = s => document.querySelector(s);
    const esc = value => String(value ?? '').replace(/[&<>"']/g,
      char => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]));
    const dash = value => value === null || value === undefined ? '—' : esc(value);
    const bool = value => cell(`<span class="${value ? 'yes' : 'no'}">${value ? 'Yes' : 'No'}</span>`);
    const money = value => value === null || value === undefined ? '—' : `$${Number(value).toFixed(2)}`;
    let currentRef = data.meta.reference_default;
    let jurisdiction = 'all';
    let workload = data.quota_burn_matrix.default_workload || 'mixed';
    const modelById = id => data.models.find(model => model.id === id);
    const ref = () => modelById(currentRef);
    const matchesJurisdiction = value => jurisdiction === 'all' ||
      (jurisdiction === 'not-China' ? value !== 'China' : value === jurisdiction);
    const quality = model => ref()?.swe_pro && model.swe_pro ?
      Math.round(model.swe_pro / ref().swe_pro * 100) + '%' : '—';
    const table = (headers, rows) => `<div class="table-wrap"><table><thead><tr>${headers.map(h =>
      `<th class="${h.wrap ? 'wrap' : ''}">${esc(h.label || h)}</th>`).join('')}</tr></thead>
      <tbody>${rows.map(row => `<tr>${row.map(value => {
        const item = value && typeof value === 'object' && 'html' in value ?
          value : {html:dash(value),class:''};
        return `<td class="${item.class || ''}">${item.html}</td>`;
      }).join('')}</tr>`).join('')}</tbody></table></div>`;
    const cell = (html, cls = '') => ({html, class: cls});
    const section = (id, number, title, body) => `<section class="report-section" id="${id}">
      <div class="section-title"><span>${number}</span><h2>${title}</h2></div>${body}</section>`;
    const subsection = (title, note, body) => `<h3>${title}</h3>${note ? `<p class="section-note">${note}</p>` : ''}${body}`;

    function overview() {
      const kpis = `<div class="kpis">${data.headline_stats.map(item => `<div class="kpi"><span>${esc(item.label)}</span>
        <strong>${esc(item.value)}${esc(item.unit || '')}</strong><small>${esc(item.delta || '')}</small></div>`).join('')}</div>`;
      const summaries = `<div class="summary-grid">${Object.entries(data.executive_summary).map(([key,value]) =>
        `<article class="summary"><h3>${esc(key.replace('_',' '))}</h3><p>${esc(value)}</p></article>`).join('')}</div>`;
      const trends = table([{label:'Trend',wrap:true},'Latest','Change','History'], Object.values(data.trends).map(trend => {
        const first = trend.history[0].value, last = trend.history.at(-1).value;
        return [cell(esc(trend.label),'wrap'), last, (last-first).toFixed(1),
          cell(trend.history.map(point => `${point.date.slice(5)}: ${point.value}`).join(' · '),'wrap')];
      }));
      const changes = data.changelog.map(item => `<div class="change"><time>${esc(item.date)}</time><b>${esc(item.tag)}</b><span>${esc(item.text)}</span></div>`).join('');
      return kpis + subsection('Executive summary','',summaries) + subsection('Trends','Six-month market signals.',trends) +
        subsection('What changed recently','',changes) + subsection('Action items','',`<ul class="items">${data.actions.map(x => `<li>${esc(x)}</li>`).join('')}</ul>`);
    }
    function models() {
      const currentRows = roster.models.filter(model => matchesJurisdiction(model.region)).map(model => [
        cell(`${esc(model.name)}<small>${esc(model.family)} · ${esc(model.channel.replaceAll('_',' '))}</small>`,'model'),
        model.provider, model.status, model.default_level,
        cell(esc(model.levels.length ? `${model.control}: ${model.levels.join(' · ')}` : 'No documented control'),'wrap'),
        model.speed_band, cell(esc(model.speed_note),'wrap'), model.price, model.context, model.region
      ]);
      const current = table(['Current model','Provider','Status','Default','Levels','Speed','Speed evidence',
        'Price / Mtok','Context','Region'],currentRows);
      const rows = data.models.filter(model => matchesJurisdiction(model.jurisdiction)).map(model => [
        cell(`${esc(model.name)}<small>${esc(model.license)} · ${esc(model.tier)}</small>`,'model'), model.provider,
        quality(model), model.swe_pro, model.swe_verified, model.livecodebench, model.aime,
        money(model.api_in), money(model.api_out), money(model.api_cache_hit), model.context_label,
        model.tok_per_sec, model.released
      ]);
      const landscape = table(['Model','Provider','Quality vs ref','SWE-Pro','SWE-Ver','LCB','AIME',
        'Input','Output','Cache','Context','tok/s','Released'], rows);
      return subsection('Current model roster','Representative current models, provider-native configuration levels, and labelled speed evidence.',current) +
        subsection('Benchmark landscape','The original benchmark table is retained. Quality is calculated against the selected reference. Unknown values remain unknown.',landscape);
    }
    function burn() {
      const matrix = data.quota_burn_matrix;
      const findRow = id => [...matrix.openai_matrix,...matrix.anthropic_matrix,...matrix.google_matrix]
        .find(row => row.model_id === id);
      const cacheFactor = id => {
        const model = modelById(id); const preset = matrix.workload_presets[workload];
        const hit = preset?.cache_hit_rate || 0; const discount = model?.cache_discount ?? 1;
        return (1-hit) + hit*discount;
      };
      const refRow = findRow(currentRef);
      const refValue = refRow && ['medium','high','low','xhigh','max','off'].map(k => refRow[k]).find(v => typeof v === 'number');
      const divisor = (refValue || 1) * cacheFactor(currentRef);
      const block = (title, rows) => {
        const keys = [...new Set(rows.flatMap(row => Object.keys(row).filter(key => !['model_id','note'].includes(key))))];
        return subsection(title,'',table(['Model',...keys], rows.map(row => [
          cell(esc(modelById(row.model_id)?.name || row.model_id),'model'),
          ...keys.map(key => typeof row[key] === 'number' ? `${(row[key]*cacheFactor(row.model_id)/divisor).toFixed(2)}×` : '—')
        ])));
      };
      const multipliers = table(['Modifier','Multiplier','Scope'], matrix.stacking_multipliers.map(x => [x.name,x.multiplier,x.scope]));
      const workloads = table(['Preset','Cache hit','Description'], Object.values(matrix.workload_presets).map(x => [x.label,`${x.cache_hit_rate*100}%`,cell(esc(x.description),'wrap')]));
      const factors = matrix.effort_quality_factors;
      const candidates = [...matrix.openai_matrix,...matrix.anthropic_matrix,...matrix.google_matrix].flatMap(row => {
        const model = modelById(row.model_id);
        return Object.entries(row).filter(([key,value]) => typeof value === 'number').map(([effort,value]) => {
          const relativeBurn = value*cacheFactor(row.model_id)/divisor;
          const relativeQuality = model?.swe_pro && ref()?.swe_pro ? model.swe_pro/ref().swe_pro*(factors[effort] ?? 1)*100 : null;
          return {model,effort,relativeBurn,relativeQuality,efficiency:relativeQuality ? relativeBurn/relativeQuality : null};
        });
      }).filter(x => x.relativeQuality >= 80 && x.efficiency !== null)
        .sort((a,b) => a.efficiency-b.efficiency).slice(0,10);
      const leaders = table(['Model','Configuration','Burn vs ref','Quality vs ref','Burn / quality'],candidates.map(x => [
        x.model?.name || 'Unknown',x.effort,`${x.relativeBurn.toFixed(2)}×`,`${x.relativeQuality.toFixed(0)}%`,x.efficiency.toFixed(4)
      ]));
      return `<p class="section-note">${esc(matrix.methodology)}</p>` + block('OpenAI effort levels',matrix.openai_matrix) +
        block('Anthropic effort levels',matrix.anthropic_matrix) + block('Google thinking budgets',matrix.google_matrix) +
        subsection('No effort control · fixed burn per model',matrix.non_reasoning_note,'') +
        subsection('Stacking multipliers','',multipliers) + subsection('Workload and cache assumptions',matrix.cache_methodology,workloads) +
        subsection('Efficiency leaders','Top 10 configurations meeting an 80% quality floor.',leaders) +
        subsection('Quality methodology','',`<p class="section-note">${esc(matrix.quality_methodology)}</p>`);
    }
    function commercial() {
      const subscriptions = table(['Provider','Tier','$/month','Limits','Models','Features'], data.subscriptions.map(x => [
        x.provider,x.tier,x.price_usd,cell(esc(x.limits),'wrap'),cell(esc(x.models),'wrap'),cell(esc(x.features),'wrap')
      ]));
      const policies = table(['Provider','Subscription automation','Enforcement','First-party exception','API required'], data.agent_policies.map(x => [
        x.provider,x.subscription_automated,cell(esc(x.enforcement),'wrap'),cell(esc(x.first_party_exception),'wrap'),bool(x.api_required_for_automation)
      ]));
      return subsection('Subscription tiers','',subscriptions) + subsection('Automated agent policy','',policies);
    }
    function harnesses() {
      const rows = data.harnesses.map(x => [cell(`${esc(x.name)}<small>${esc(x.license)}</small>`,'model'),x.vendor,x.category,
        bool(x.mcp),bool(x.skills),bool(x.hooks),bool(x.subagents),bool(x.voice),bool(x.remote),bool(x.computer_use),
        bool(x.lsp),x.memory,x.swe_pro,cell(esc(x.pricing),'wrap')]);
      const landscape = table(['Harness','Vendor','Category','MCP','Skills','Hooks','Subagents','Voice','Remote',
        'Computer use','LSP','Memory','SWE-Pro','Pricing'],rows);
      const profiles = data.harnesses.map(x => `<details><summary>${esc(x.name)} · ${esc(x.category)}</summary><div>
        <strong>Best at:</strong> ${esc(x.sweet_spot)}<br><strong>Limitations:</strong> ${esc(x.stumbles)}<br>
        <strong>Providers:</strong> ${esc(x.providers.join(', '))} · <strong>Sandbox:</strong> ${esc(x.sandbox)}</div></details>`).join('');
      return subsection('Agent harness landscape','Supervised and autonomous capabilities remain visible in one comparison.',landscape) + subsection('Detailed profiles','',profiles);
    }
    function selfHosting() {
      const hardware = data.self_hosting.hardware_options;
      const fitHeaders = ['Model',...hardware.map(x => x.name)];
      const fitRows = data.self_hosting.models.filter(x => matchesJurisdiction(x.jurisdiction)).map(model => [
        cell(`${esc(model.name)}<small>${esc(model.license)} · ${esc(model.params_total)}B total</small>`,'model'),
        ...hardware.map(hw => {
          const fit = model.fits[hw.id];
          return fit ? cell(`${esc(fit.quant)} · ${esc(fit.vram_used)} GB · ${esc(fit.tok_per_sec)} tok/s`,'wrap') : 'Does not fit';
        })
      ]);
      const fit = table(fitHeaders,fitRows);
      const options = table(['Hardware','Type','VRAM','Cost','Notes'],hardware.map(x => [x.name,x.type,`${x.vram_gb} GB`,x.cost_label,cell(esc(x.notes),'wrap')]));
      const frameworks = table(['Framework','Best for','Notes'],data.self_hosting.frameworks.map(x => [x.name,x.best_for,cell(esc(x.notes),'wrap')]));
      return subsection('Hardware × model fit','Quantization, memory use, and throughput estimates for every recorded pairing.',fit) +
        subsection('Hardware options','',options) + subsection('Inference frameworks','',frameworks);
    }
    function capabilities() {
      const axes = data.capabilities.axes;
      const rated = data.models.filter(x => x.capability_levels && matchesJurisdiction(x.jurisdiction));
      const rows = rated.map(model => [cell(esc(model.name),'model'),...axes.map(axis => model.capability_levels[axis.key] ?? '—')]);
      const matrix = table(['Model',...axes.map(x => x.label)],rows);
      return subsection('Capability analysis','The original six-axis radar content is retained as a more legible comparison table. The same rubric and ratings are used.',matrix) +
        `<p class="section-note">${esc(data.capabilities.methodology)}</p>`;
    }
    function taskFit() {
      const tf = data.strategy.task_fit;
      const providers = ['anthropic','openai','google','self_hosted'];
      const rows = tf.rows.map(row => [cell(`<strong>${esc(row.task)}</strong><br>${esc(row.description)}`,'wrap'),...providers.map(provider => {
        const rec = row.recommendations[provider];
        const model = modelById(rec.model_id) || data.self_hosting.models.find(x => x.id === rec.model_id);
        const runners = row.runner_up_per_provider[provider] || [];
        return cell(`<strong>${esc(model?.name || 'No recommendation')}</strong>${rec.effort ? ` · ${esc(rec.effort)}` : ''}<br>${esc(rec.rationale)}${runners.length ? `<br><small>Also: ${esc(runners.join('; '))}</small>` : ''}`,'wrap');
      })]);
      return subsection('Task-fit recommendations',tf.description,table(['Task','Anthropic','OpenAI','Google','Self-hosted'],rows));
    }
    function strategy() {
      const s = data.strategy;
      const recommendation = `<div class="strategy-grid"><article class="strategy-card"><h3>${esc(s.current_recommendation.label)}</h3>
        <strong class="mono">~$${esc(s.current_recommendation.monthly_usd)}/month</strong><ul class="items">${s.current_recommendation.components.map(x => `<li>${esc(x)}</li>`).join('')}</ul>
        <p>${esc(s.current_recommendation.rationale)}</p></article><article class="strategy-card"><h3>Routing strategy</h3>
        <ul class="items">${s.routing.map(x => `<li><strong>${esc(x.tier)}</strong>: ${esc(x.use_for)}<br>${esc(x.preferred)} · ${esc(x.cost_label)}</li>`).join('')}</ul></article></div>`;
      const alternatives = `<div class="strategy-grid">${s.alternatives.map(x => `<article class="strategy-card"><h3>${esc(x.label)}</h3>
        <strong class="mono">~$${esc(x.monthly_usd)}/month</strong><p>${esc(x.rationale)}</p><p><strong>Verdict:</strong> ${esc(x.verdict)}</p></article>`).join('')}</div>`;
      return subsection('Recommended stack and routing','',recommendation) + subsection('Alternatives considered','',alternatives) +
        subsection('Open questions','',`<ul class="items">${s.open_questions.map(x => `<li>${esc(x)}</li>`).join('')}</ul>`);
    }
    function sources() {
      const categories = [...new Set(data.sources.map(x => x.category))];
      const rosterSources = [...new Map([...roster.models,...roster.watchlist].map(x => [x.source,x])).values()];
      return `${subsection('Current roster sources','Primary sources used for the v2 model roster.',`<div class="source-columns">${rosterSources.map(x =>
        `<div class="source"><a href="${esc(x.source)}" target="_blank" rel="noopener">${esc(x.provider)} · ${esc(x.name)}</a></div>`).join('')}</div>`)}
        ${subsection('Original report sources','The complete original source register is retained.',`<div class="source-columns">${categories.map(category => `<div class="source"><strong>${esc(category)}</strong><ul class="items">${data.sources.filter(x => x.category === category).map(x =>
        `<li><a href="${esc(x.url)}" target="_blank" rel="noopener">${esc(x.n)} · ${esc(x.title)}</a>${x.note ? `<br>${esc(x.note)}` : ''}</li>`).join('')}</ul></div>`).join('')}</div>
        <div class="disclaimer"><strong>AI-generated, no warranty.</strong> Verify figures, prices, benchmarks, and policy details against the linked primary sources. This report is informational research, not financial, legal, procurement, security, or other professional advice.</div>`)}`;
    }
    const content = {
      overview: ['00','Market briefing',overview],
      taskfit: ['01','Decide by task',taskFit],
      strategy: ['02','Stack and routing strategy',strategy],
      capabilities: ['03','Capability comparison',capabilities],
      models: ['04','Model landscape',models],
      burn: ['05','Reasoning effort and quota burn',burn],
      commercial: ['06','Subscriptions and automation policy',commercial],
      harnesses: ['07','Agent harnesses',harnesses],
      selfhosting: ['08','Self-hosting',selfHosting],
      sources: ['09','Sources and limitations',sources]
    };
    const orders = {
      'decision-journey': ['overview','taskfit','strategy','capabilities','models','burn','commercial','harnesses','selfhosting','sources'],
      'market-map': ['overview','models','capabilities','burn','commercial','harnesses','selfhosting','taskfit','strategy','sources'],
      'workbench': ['models','taskfit','burn','capabilities','harnesses','commercial','selfhosting','strategy','overview','sources'],
      'living-brief': ['overview','strategy','taskfit','models','burn','capabilities','harnesses','selfhosting','commercial','sources']
    };
    const groups = {
      overview:'Briefing', taskfit:'Decisions', strategy:'Decisions', capabilities:'Market',
      models:'Market', burn:'Economics', commercial:'Economics', harnesses:'Execution',
      selfhosting:'Deployment', sources:'Evidence'
    };
    function render() {
      const order = orders[design] || orders['decision-journey'];
      $('#content').innerHTML = order.map(id => section(id,...content[id].slice(0,2),content[id][2]())).join('');
      let previous = '';
      $('#nav').innerHTML = order.map(id => {
        const group = groups[id]; const heading = group !== previous ? `<div class="group">${group}</div>` : '';
        previous = group; return `${heading}<a href="#${id}">${content[id][1]}</a>`;
      }).join('');
      const current = ref();
      $('#context-panel').innerHTML = `<h3>Decision context</h3><p><strong>Reference</strong><br>${esc(current?.name || 'None')}</p>
        <p><strong>Workload</strong><br>${esc(data.quota_burn_matrix.workload_presets[workload]?.label)}</p>
        <h3>Current actions</h3><ol class="items">${data.actions.slice(0,5).map(x => `<li>${esc(x)}</li>`).join('')}</ol>`;
      observeSections();
    }
    function observeSections() {
      const links = [...document.querySelectorAll('#nav a')];
      const observer = new IntersectionObserver(entries => entries.forEach(entry => {
        if (!entry.isIntersecting) return;
        links.forEach(link => link.classList.toggle('active',link.hash === `#${entry.target.id}`));
      }),{rootMargin:'-20% 0px -70% 0px'});
      document.querySelectorAll('.report-section').forEach(section => observer.observe(section));
    }
    data.models.forEach(model => $('#reference').add(new Option(model.name,model.id,false,model.id === currentRef)));
    $('#workload').value = workload;
    $('#reference').addEventListener('change',event => { currentRef = event.target.value; render(); });
    $('#jurisdiction').addEventListener('change',event => { jurisdiction = event.target.value; render(); });
    $('#workload').addEventListener('change',event => { workload = event.target.value; render(); });
    render();
  </script>
</body>
</html>
