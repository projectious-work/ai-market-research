# aibox starship config â€” pastel powerline preset
# One-line prompt inspired by https://starship.rs/presets/#pastel-powerline.
palette = "aibox"

format = """
[î‚¶](fg:#7FBBB3)\
$directory\
[î‚°](fg:#7FBBB3 bg:#A7C080)\
$git_branch\
$git_status\
[î‚°](fg:#A7C080 bg:#D699B6)\
$python\
$rust\
$nodejs\
$golang\
[î‚°](fg:#D699B6 bg:#2D353B)\
$cmd_duration\
$character"""

[directory]
style = "bold bg:#7FBBB3 fg:#2D353B"
format = "[ $path ]($style)"
truncation_length = 3
truncate_to_repo = true

[git_branch]
style = "bg:#A7C080 fg:#2D353B"
symbol = " "
format = "[ $symbol$branch ]($style)"

[git_status]
style = "bg:#A7C080 fg:#2D353B"
format = "[$all_status$ahead_behind ]($style)"
ahead = "â‡،$count"
behind = "â‡£$count"
diverged = "â‡•â‡،$ahead_countâ‡£$behind_count"
modified = "!$count"
staged = "+$count"
untracked = "?$count"

[python]
style = "bg:#D699B6 fg:#2D353B"
format = "[ $symbol$version ]($style)"
[rust]
style = "bg:#D699B6 fg:#2D353B"
format = "[ $symbol$version ]($style)"
[nodejs]
style = "bg:#D699B6 fg:#2D353B"
format = "[ $symbol$version ]($style)"
[golang]
style = "bg:#D699B6 fg:#2D353B"
format = "[ $symbol$version ]($style)"

[cmd_duration]
style = "fg:#7A8478"
min_time = 2_000
format = "[ $duration ]($style)"

[character]
success_symbol = "[â‌¯](bold fg:#7FBBB3) "
error_symbol = "[â‌¯](bold fg:#E67E80) "

[palettes.aibox]
bg = "#2D353B"
fg = "#D3C6AA"
accent = "#7FBBB3"
