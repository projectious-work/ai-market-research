# aibox tmux configuration
set -g default-shell /bin/bash
set -g default-command /bin/bash
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -g history-limit 50000
set -g escape-time 10
set -g focus-events on
set -g xterm-keys on
set -s extended-keys on
set -g allow-passthrough on
set -g set-clipboard external
set -g mode-keys vi
set -g default-terminal "tmux-256color"
set -ga terminal-features ",*:extkeys,wezterm:RGB,clipboard,xterm-256color:RGB,clipboard,tmux-256color:RGB"
set -ga terminal-overrides ",xterm-256color:Tc,tmux-256color:Tc"
set -g status-interval 10
set -g prefix C-g
unbind C-b
bind C-g send-prefix

# Pane navigation mirrors the old aibox leader muscle memory.
bind-key -N "Show aibox/tmux key bindings" ? display-popup -w 110 -h 90% -E "bash \"$HOME/.local/bin/aibox-tmux-cheatsheet\""
bind-key -N "Select pane left" h select-pane -L
bind-key -N "Select pane down / next harness pane" j select-pane -D
bind-key -N "Select pane up / prev harness pane" k select-pane -U
bind-key -N "Select pane right" l select-pane -R
bind-key -N "Split pane right" r split-window -h -c "#{pane_current_path}"
bind-key -N "Split pane down" d split-window -v -c "#{pane_current_path}"
bind-key -N "Kill pane" x kill-pane
bind-key -N "Toggle pane zoom" f resize-pane -Z
bind-key -N "Toggle pane zoom (alias)" z resize-pane -Z
bind-key -N "Kill tmux session" q confirm-before -p "kill tmux session ai-market-research? (y/n)" kill-session
bind-key -N "Reload tmux config" R source-file ~/.config/tmux/tmux.conf \; display-message "aibox tmux config reloaded"
bind-key -N "Open log pane (lnav)" o display-popup -E -w 90% -h 80% "aibox-log-viewer"

# BR-TOOLS-AS-WINDOWS (BACK-20260510_0726-GrandDaisy, v0.25.7): one-letter
# prefix shortcuts to jump directly to named tool/harness windows.
# find-window -Z focuses the target window; silently no-ops when absent.
bind-key -N "Switch to lazygit window" g find-window -Z 'lazygit'
bind-key -N "Switch to shell window" s find-window -Z 'shell'

# Host paste sends line-feed bytes for newlines, and line-feed is C-j.
# Binding global C-j makes pasted multiline text corrupt in panes. Keep smart
# down navigation on C-Down and prefix j instead.
unbind-key -q -n C-j
unbind-key -q -T copy-mode-vi C-j
set -g @vim_navigator_mapping_down "C-Down"


bind-key -N "Choose layout" L display-menu -T "#[align=centre]Layout" -x C -y C \
  "Dev (work=files|harness)" d "run-shell 'aibox-tmux-confirm-and-switch dev'" \
  "AI (work=files|harness; ai windows)" a "run-shell 'aibox-tmux-confirm-and-switch ai'" \
  "Focus (one window per harness)" f "run-shell 'aibox-tmux-confirm-and-switch focus'" \
  "Cowork (files|shell + ai windows)" w "run-shell 'aibox-tmux-confirm-and-switch cowork'" \
  "" \
  "Cancel" q ""


bind-key -N "Choose theme" T display-menu -T "#[align=centre]Theme" -x C -y C \
  "gruvbox dark" g "run-shell 'aibox theme --theme gruvbox-dark && aibox-tmux-refresh-theme'" \
  "catppuccin mocha" c "run-shell 'aibox theme --theme catppuccin-mocha && aibox-tmux-refresh-theme'" \
  "tokyo night" t "run-shell 'aibox theme --theme tokyo-night && aibox-tmux-refresh-theme'" \
  "dracula" d "run-shell 'aibox theme --theme dracula && aibox-tmux-refresh-theme'" \
  "projectious" p "run-shell 'aibox theme --theme projectious && aibox-tmux-refresh-theme'" \
  "" \
  "Toggle light/dark" l "run-shell 'aibox theme --mode auto && aibox-tmux-refresh-theme'" \
  "" \
  "Heavy: restart TUIs (kill+respawn lazygit/lnav/AI)" R "run-shell 'AIBOX_THEME_CONFIRM_RESTART_TUIS=true aibox-tmux-refresh-theme --restart-tuis'" \
  "" \
  "Cancel" q ""


set -g status on
set -g status-style "bg=#2D353B,fg=#D3C6AA"
set -g window-status-current-style "bg=#7FBBB3,fg=#2D353B,bold"
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
# Inactive panes are dimmed a touch (bg+fg both biased ~12% toward
# muted) so the focused pane stands out without making non-focus
# content hard to read. Tweak via `themes::dim_inactive_pane_colors`.
set -g window-style "bg=#363E42,fg=#BCB59D"
set -g window-active-style "bg=#2D353B,fg=#D3C6AA"
set -g pane-border-style "fg=#7A8478,bg=#2D353B"
set -g pane-active-border-style "fg=#7FBBB3,bg=#2D353B"
set -g message-style "bg=#7FBBB3,fg=#2D353B"
set -g message-command-style "bg=#7FBBB3,fg=#2D353B"
set -g mode-style "bg=#7FBBB3,fg=#2D353B"
set -g clock-mode-colour "#7FBBB3"
set -g popup-style "bg=#2D353B,fg=#D3C6AA"
set -g popup-border-style "fg=#7FBBB3,bg=#2D353B"
set -g status-left " #S #{W:#I:#W ,#[reverse]#I:#W#[noreverse] }"
set -g status-left-length 80
set -g status-right " #(aibox-status --once 2>/dev/null || true) %H:%M "

# Powerkit status. Theme: everforest-dark (custom palette)
