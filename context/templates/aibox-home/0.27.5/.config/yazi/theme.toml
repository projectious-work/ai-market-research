# =============================================================================
# Yazi theme — generated by aibox CLI from the active theme palette
# Docs: https://yazi-rs.github.io/docs/configuration/theme
# =============================================================================

[mgr]
cwd = { fg = "#7FBBB3" }
hovered = { fg = "#2D353B", bg = "#D3C6AA" }
preview_hovered = { bg = "#313244", underline = true }
find_keyword = { fg = "#DBBC7F", bold = true }
find_position = { fg = "#BC9694", italic = true }
marker_selected = { fg = "#A7C080", bg = "#A7C080" }
marker_copied = { fg = "#7FBBB3", bg = "#7FBBB3" }
marker_cut = { fg = "#E67E80", bg = "#E67E80" }

[tabs]
active = { fg = "#2D353B", bg = "#7FBBB3", bold = true }
inactive = { fg = "#7A8478", bg = "#313244" }
sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }

[mode]
normal_main = { fg = "#2D353B", bg = "#A7C080", bold = true }
normal_alt = { fg = "#A7C080", bg = "#313244", bold = true }
select_main = { fg = "#2D353B", bg = "#7FBBB3", bold = true }
select_alt = { fg = "#7FBBB3", bg = "#313244", bold = true }
unset_main = { fg = "#2D353B", bg = "#BC9694", bold = true }
unset_alt = { fg = "#BC9694", bg = "#313244", bold = true }

[status]
overall = { fg = "#D3C6AA", bg = "#313244" }
sep_left = { open = "", close = "" }
sep_right = { open = "", close = "" }
perm_type = { fg = "#7FBBB3" }
perm_read = { fg = "#DBBC7F" }
perm_write = { fg = "#E67E80" }
perm_exec = { fg = "#A7C080" }
perm_sep = { fg = "#7A8478" }
progress_label = { fg = "#D3C6AA", bold = true }
progress_normal = { fg = "#7FBBB3", bg = "#313244" }
progress_error = { fg = "#E67E80", bg = "#313244" }

[input]
border = { fg = "#7FBBB3" }
title = { fg = "#7FBBB3", bg = "#2D353B", bold = true }
value = { fg = "#D3C6AA", bg = "#2D353B" }
selected = { reversed = true }

[pick]
border = { fg = "#7FBBB3" }
active = { fg = "#BC9694" }
inactive = { fg = "#7A8478", bg = "#2D353B" }

[cmp]
border = { fg = "#7FBBB3" }
active = { fg = "#BC9694" }
inactive = { fg = "#7A8478", bg = "#2D353B" }

[tasks]
border = { fg = "#7FBBB3" }
title = { fg = "#7FBBB3", bg = "#2D353B", bold = true }
hovered = { bg = "#313244", underline = true }

[which]
mask = { bg = "#313244" }
cand = { fg = "#83C092" }
rest = { fg = "#7A8478" }
desc = { fg = "#BC9694" }
separator = "  "
separator_style = { fg = "#7A8478" }

[help]
on = { fg = "#83C092" }
run = { fg = "#BC9694" }
desc = { fg = "#D3C6AA", bg = "#2D353B" }
hovered = { bg = "#313244", bold = true }
footer = { fg = "#2D353B", bg = "#D3C6AA" }

[git]
modified = { fg = "#DBBC7F" }
untracked = { fg = "#BC9694" }
added = { fg = "#A7C080" }
deleted = { fg = "#E67E80" }
updated = { fg = "#7FBBB3" }
ignored = { fg = "#7A8478" }

[filetype]
rules = [
    { url = "*/", fg = "#7FBBB3", bold = true },
    { url = "*.rs", fg = "#D699B6" },
    { url = "*.py", fg = "#DBBC7F" },
    { url = "*.js", fg = "#DBBC7F" },
    { url = "*.ts", fg = "#7FBBB3" },
    { url = "*.sh", fg = "#A7C080" },
    { url = "*.toml", fg = "#83C092" },
    { url = "*.yaml", fg = "#83C092" },
    { url = "*.yml", fg = "#83C092" },
    { url = "*.json", fg = "#83C092" },
    { url = "*.kdl", fg = "#83C092" },
    { url = "*.html", fg = "#D699B6" },
    { url = "*.css", fg = "#7FBBB3" },
    { url = "*.md", fg = "#D3C6AA" },
    { url = "*.tex", fg = "#A7C080" },
    { url = "*.typ", fg = "#A7C080" },
    { url = "*.pdf", fg = "#E67E80" },
    { url = "*.png", fg = "#BC9694" },
    { url = "*.jpg", fg = "#BC9694" },
    { url = "*.jpeg", fg = "#BC9694" },
    { url = "*.gif", fg = "#BC9694" },
    { url = "*.svg", fg = "#BC9694" },
    { url = "*.zip", fg = "#D699B6" },
    { url = "*.tar*", fg = "#D699B6" },
    { url = "*.gz", fg = "#D699B6" },
    { url = "*.gitignore", fg = "#7A8478" },
    { url = ".env*", fg = "#E67E80" },
    { url = "Dockerfile*", fg = "#7FBBB3" },
    { url = "Makefile", fg = "#A7C080" },
    { url = "Cargo.toml", fg = "#D699B6", bold = true },
    { url = "Cargo.lock", fg = "#7A8478" },
]
