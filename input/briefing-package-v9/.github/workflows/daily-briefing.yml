name: Daily AI Market Briefing

on:
  schedule:
    # 06:00 UTC = 07:00 Berlin (winter) / 08:00 Berlin (summer)
    - cron: '0 6 * * *'
  workflow_dispatch:  # allows manual trigger from GitHub UI

permissions:
  contents: write  # needed to push commits back

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for git log diffs

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: |
          npm install -g @anthropic-ai/claude-code
          claude --version

      - name: Run daily briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          chmod +x scripts/run-briefing.sh
          ./scripts/run-briefing.sh

      - name: Commit and push if changed
        run: |
          git config user.name "AI Briefing Bot"
          git config user.email "bot@users.noreply.github.com"

          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No changes — skipping commit."
            exit 0
          fi

          # Use first line of last run summary as commit message if present
          MSG="Daily briefing $(date -u +%Y-%m-%d)"
          if [[ -f .last-run-summary ]]; then
            FIRST_LINE=$(head -n 1 .last-run-summary)
            MSG="$MSG: $FIRST_LINE"
          fi

          git add -A
          git commit -m "$MSG"
          git push
